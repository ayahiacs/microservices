<!doctype html>
<html>

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>WebSocket Test</title>
</head>

<body>
  <h1>WebSocket (Soketi) Test</h1>
  <p id="status">Connecting...</p>
  <p>
    Country: <span id="countryDisp"></span>
  </p>
  <div>
    <button onclick="loadEmployees()">Reload Employees</button>
    <button onclick="loadChecklist()">Load Checklist</button>
  </div>
  <div id="checklist"></div>
  <table border="1" id="employees" style="width:100%;border-collapse:collapse;">
    <thead>
      <tr>
        <th>ID</th>
        <th>First</th>
        <th>Last</th>
        <th>Country</th>
        <th>Salary</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
  <pre id="log"></pre>

  <script src="https://js.pusher.com/8.0/pusher.min.js"></script>
  <script>
    // Replace with your Pusher credentials (or populate from server)
    const key = 'p_a_k_challenge';
    const host = 'localhost';
    const port = '6001';
    const useSsl = false;
    const cluster = 'p_a_c_challenge';

    const opts = {
      wsHost: host,
      wsPort: port,
      wssPort: port,
      disableStats: true,
      encrypted: useSsl,
      enabledTransports: ['ws', 'wss'],
      authEndpoint: '/broadcasting/auth',
      cluster: cluster,
    };

    const pusher = new Pusher(key, opts);

    document.getElementById('status').textContent = 'Connected to Pusher (attempting)';

    // ask which country we're interested in and show it
    const country = prompt('Country to display (e.g. USA, GERMANY)', 'USA').toUpperCase();
    document.getElementById('countryDisp').textContent = country;

    function loadChecklist() {
      fetch(`/api/checklists?country=${encodeURIComponent(country)}`)
        .then(r => r.json())
        .then(data => {
          const checklistContainer = document.getElementById('checklist');
          checklistContainer.innerHTML = '';
          const checklistHeading = document.createElement('h2');
          checklistHeading.textContent = 'Checklist for ' + data.country;

          const checklistTable = document.createElement('table');
          checklistTable.className = 'table table-striped table-bordered';

          const checklistTableHead = document.createElement('thead');
          const checklistTableHeadRow = document.createElement('tr');
          const checklistTableHeadCells = [
            document.createElement('th'),
            document.createElement('th'),
            document.createElement('th'),
          ];
          checklistTableHeadCells[0].textContent = 'Field';
          checklistTableHeadCells[1].textContent = 'Complete';
          checklistTableHeadCells[2].textContent = 'Value';
          checklistTableHeadRow.append(...checklistTableHeadCells);
          checklistTableHead.append(checklistTableHeadRow);
          checklistTable.append(checklistTableHead);

          const checklistTableBody = document.createElement('tbody');
          data.employees.forEach(employee => {
            const checklistTableBodyRow = document.createElement('tr');
            const checklistTableBodyCells = [
              document.createElement('td'),
              document.createElement('td'),
              document.createElement('td'),
            ];
            checklistTableBodyCells[0].textContent = employee.fields.ssn.complete ? '✅ ' + employee.fields.ssn.message : '❌ ' + employee.fields.ssn.message;
            checklistTableBodyCells[1].textContent = employee.fields.ssn.complete ? 'Yes' : 'No';
            checklistTableBodyCells[2].textContent = employee.fields.ssn.value;
            checklistTableBodyRow.append(...checklistTableBodyCells);
            checklistTableBody.append(checklistTableBodyRow);
          });
          checklistTable.append(checklistTableBody);

          checklistContainer.append(checklistHeading);
          checklistContainer.append(checklistTable);
        })
        .catch(err => console.error('fetch checklist', err));
    }

    loadChecklist();
    // fetch initial employee list and render
    function loadEmployees() {
      fetch(`/api/employees?country=${encodeURIComponent(country)}`)
        .then(r => r.json())
        .then(data => {
          const tbody = document.querySelector('#employees tbody');
          tbody.innerHTML = '';
          if (Array.isArray(data.data)) {
            data.data.forEach(emp => {
              const tr = document.createElement('tr');
              tr.id = `emp-${emp.id}`;
              tr.innerHTML = `<td>${emp.id}</td><td>${emp.first_name}</td><td>${emp.last_name}</td><td>${emp.country}</td><td>${emp.salary_per_annum ?? emp.salary ?? ''}</td>`;
              tbody.appendChild(tr);
            });
          }
        })
        .catch(err => console.error('fetch employees', err));
    }

    loadEmployees();

    // subscribe to checklist updates for the country so we can refresh the grid
    const listChannel = pusher.subscribe(`checklists.${country}`);
    listChannel.bind('App\\Events\\EmployeeCreated', reloadHandler);
    listChannel.bind('App\\Events\\EmployeeUpdated', reloadHandler);
    listChannel.bind('App\\Events\\EmployeeDeleted', reloadHandler);
    // fallback: our processors send a generic payload event key
    listChannel.bind_global(function (eventName, data) {
      // data = { event: 'employee_created'|'employee_updated'|'employee_deleted', employee_id }
      if (data && data.event && data.employee_id) {
        console.log('received checklist event', data);
        loadEmployees();
      }
    });

    pusher.connection.bind('connected', function () {
      document.getElementById('status').textContent = 'Connected';
    });

    pusher.connection.bind('error', function (err) {
      document.getElementById('status').textContent = 'Error: ' + JSON.stringify(err);
    });
  </script>
</body>

</html>
